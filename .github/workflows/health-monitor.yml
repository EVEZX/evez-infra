name: EVEZ Cross-Platform Health Monitor
on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Check EVEZ Provider (Railway)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://evez-provider-production.up.railway.app/health --max-time 10)
          echo "EVEZ Provider: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ EVEZ Provider is DOWN!"
          fi
      
      - name: Check Vultr Services
        run: |
          SERVICES="9100 9300 9500 9600 9700 9800 9998"
          for PORT in $SERVICES; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://66.42.125.106:$PORT/health --max-time 5 || echo "000")
            echo "Vultr port $PORT: HTTP $STATUS"
          done
      
      - name: Check GitHub Pages
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://evezx.github.io/evez-ai/ --max-time 10)
          echo "GitHub Pages: HTTP $STATUS"
