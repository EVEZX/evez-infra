name: EVEZ Health Monitor
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all services
        run: |
          echo "=== Railway ==="
          curl -s https://evez-provider-production.up.railway.app/health --max-time 10 || echo "RAILWAY DOWN"
          echo ""
          echo "=== GitHub Pages ==="
          for p in "" demo.html api-docs.html status.html; do
            c=$(curl -s -o /dev/null -w "%{http_code}" "https://evezx.github.io/evez-ai/${p}" --max-time 5)
            echo "$p → $c"
          done
          echo ""
          echo "=== Vultr ==="
          for port in 9100 9700 10016; do
            c=$(curl -s -o /dev/null -w "%{http_code}" "http://66.42.125.106:${port}/health" --max-time 5)
            echo "port $port → $c"
          done
