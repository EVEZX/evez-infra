name: EVEZ AI Serverless Chat
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Chat prompt'
        required: true
      model:
        description: 'Model (evez-smart, evez-code, glm-5.1, etc)'
        required: false
        default: 'evez-smart'
      max_tokens:
        description: 'Max tokens'
        required: false
        default: '500'

jobs:
  chat:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      EVEZ_API_KEY: ${{ secrets.EVEZ_API_KEY }}
      RAILWAY_URL: https://evez-provider-production.up.railway.app
    steps:
      - name: Call EVEZ Provider
        id: api-call
        run: |
          # Build JSON payload safely using Python to avoid shell injection
          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({
              'model': '${{ github.event.inputs.model }}',
              'messages': [{'role': 'user', 'content': '''${{ github.event.inputs.prompt }}'''}],
              'max_tokens': int('${{ github.event.inputs.max_tokens }}' or '500')
          }))
          ")

          RESPONSE=$(curl -s -X POST "${{ env.RAILWAY_URL }}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            ${EVEZ_API_KEY:+-H "Authorization: Bearer $EVEZ_API_KEY"} \
            -d "$PAYLOAD" \
            --max-time 60)

          # Extract content
          echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              if 'choices' in d:
                  print(d['choices'][0]['message']['content'])
              else:
                  print(json.dumps(d, indent=2)[:500])
          except Exception as e:
              print(f'Parse error: {e}')
          "
