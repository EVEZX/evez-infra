name: EVEZ AI Serverless Chat
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Chat prompt'
        required: true
      model:
        description: 'Model (evez-smart, evez-code, glm-5.1, etc)'
        required: false
        default: 'evez-smart'
      max_tokens:
        description: 'Max tokens'
        required: false
        default: '500'

jobs:
  chat:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call EVEZ Provider
        run: |
          RESPONSE=$(curl -s -X POST https://evez-provider-production.up.railway.app/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"${{ github.event.inputs.model }}\", \"messages\": [{\"role\": \"user\", \"content\": \"${{ github.event.inputs.prompt }}\"}], \"max_tokens\": ${{ github.event.inputs.max_tokens }}}" \
            --max-time 60)
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          # Extract content
          echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              if 'choices' in d:
                  print(d['choices'][0]['message']['content'])
              else:
                  print(json.dumps(d, indent=2)[:500])
          except Exception as e:
              print(f'Parse error: {e}')
          "
