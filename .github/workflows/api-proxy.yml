name: EVEZ API Proxy
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Chat prompt'
        required: true
      model:
        description: 'Model name'
        required: false
        default: 'auto'

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      EVEZ_API_KEY: ${{ secrets.EVEZ_API_KEY }}
      RAILWAY_URL: https://evez-provider-production.up.railway.app
    steps:
      - name: Call EVEZ Provider
        run: |
          # Write prompt to file to avoid shell injection via user input
          PROMPT_FILE=$(mktemp)
          cat > "$PROMPT_FILE" << 'PROMPT_EOF'
          ${{ github.event.inputs.prompt }}
          PROMPT_EOF

          PAYLOAD=$(python3 -c "
          import json
          with open('$PROMPT_FILE') as f:
              prompt = f.read().strip()
          print(json.dumps({
              'model': '${{ github.event.inputs.model }}',
              'messages': [{'role': 'user', 'content': prompt}]
          }))
          ")

          AUTH_HEADER=""
          if [ -n "$EVEZ_API_KEY" ]; then
            AUTH_HEADER="-H \"Authorization: Bearer $EVEZ_API_KEY\""
          fi

          RESPONSE=$(curl -s -X POST "${{ env.RAILWAY_URL }}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            ${EVEZ_API_KEY:+-H "Authorization: Bearer $EVEZ_API_KEY"} \
            -d "$PAYLOAD" \
            --max-time 30)
          echo "$RESPONSE"
          rm -f "$PROMPT_FILE"
