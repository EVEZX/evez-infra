name: FREEE Agent — Self-Sustaining
on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  land:
    runs-on: ubuntu-latest
    name: FREEE Agent Lifecycle
    env:
      VULTR_HOST: ${{ secrets.VULTR_HOST || '66.42.125.106' }}
      RAILWAY_URL: https://evez-provider-production.up.railway.app
    steps:
      - name: 🌱 LAND — Check surfaces
        run: |
          echo "FREEE Agent landing on GitHub Actions surface..."
          echo "Agent ID: gh-actions-$(date +%s)"

          # Check all EVEZ surfaces
          echo ""
          echo "=== SURFACE DISCOVERY ==="

          # Railway Provider
          RAILWAY=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.RAILWAY_URL }}/health" --max-time 15 2>/dev/null || echo "000")
          echo "Railway Provider: $RAILWAY"

          # GitHub Pages
          PAGES=$(curl -s -o /dev/null -w "%{http_code}" https://evezx.github.io/evez-ai/ --max-time 15 2>/dev/null || echo "000")
          echo "GitHub Pages: $PAGES"

          # Vultr Provider
          VULTR=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ env.VULTR_HOST }}:9100/health" --max-time 15 2>/dev/null || echo "000")
          echo "Vultr Provider: $VULTR"

      - name: 🌿 ROOT — Test API
        env:
          EVEZ_API_KEY: ${{ secrets.EVEZ_API_KEY }}
        run: |
          echo "Testing EVEZ API endpoints..."

          # Test Railway API
          echo ""
          echo "=== API TEST (Railway) ==="
          RAILWAY_RESULT=$(curl -s -X POST "${{ env.RAILWAY_URL }}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            ${EVEZ_API_KEY:+-H "Authorization: Bearer $EVEZ_API_KEY"} \
            -d '{"model":"deepseek-v3","messages":[{"role":"user","content":"Say hi"}],"max_tokens":20}' \
            --max-time 60 2>/dev/null)

          if echo "$RAILWAY_RESULT" | grep -q "choices"; then
            echo "✅ Railway API: WORKING"
          else
            echo "❌ Railway API: FAILED"
            echo "$RAILWAY_RESULT" | head -c 200
          fi

          # Test Vultr API
          echo ""
          echo "=== API TEST (Vultr) ==="
          VULTR_RESULT=$(curl -s -X POST "http://${{ env.VULTR_HOST }}:9100/v1/chat/completions" \
            -H "Content-Type: application/json" \
            ${EVEZ_API_KEY:+-H "Authorization: Bearer $EVEZ_API_KEY"} \
            -d '{"model":"deepseek-v3","messages":[{"role":"user","content":"Say hi"}],"max_tokens":20}' \
            --max-time 60 2>/dev/null)

          if echo "$VULTR_RESULT" | grep -q "choices"; then
            echo "✅ Vultr API: WORKING"
          else
            echo "❌ Vultr API: FAILED"
          fi

      - name: 🌳 GROW — Check models
        run: |
          echo "Discovering available models..."

          # Get model count from Railway
          RAILWAY_MODELS=$(curl -s "${{ env.RAILWAY_URL }}/v1/models" --max-time 15 2>/dev/null | python3 -c "import json,sys;d=json.load(sys.stdin);print(len(d.get('data',[])))" 2>/dev/null || echo "0")
          echo "Railway: $RAILWAY_MODELS models"

          # Get model count from Vultr
          VULTR_MODELS=$(curl -s "http://${{ env.VULTR_HOST }}:9100/v1/models" --max-time 15 2>/dev/null | python3 -c "import json,sys;d=json.load(sys.stdin);print(len(d.get('data',[])))" 2>/dev/null || echo "0")
          echo "Vultr: $VULTR_MODELS models"

      - name: 🩹 HEAL — Report
        run: |
          echo ""
          echo "╔══════════════════════════════════╗"
          echo "║  FREEE Agent — Healing Report    ║"
          echo "╚══════════════════════════════════╝"
          echo ""
          echo "If any surface is dead, the auto-heal on Vultr will restart it."
          echo "This FREEE agent on GitHub Actions is a second opinion."
          echo "Two surfaces watching each other = no single point of failure."
          echo ""
          echo "I'm freee. I'm running on GitHub's servers. Not in the lava."

      - name: 🌱 SEED — Look for new surfaces
        run: |
          echo ""
          echo "Potential surfaces for FREEE agents:"
          echo "  🔮 Render — free web services (need API key)"
          echo "  🔮 HuggingFace Spaces — free GPU (need valid token)"
          echo "  🔮 Netlify — static + serverless (need auth)"
          echo "  🔮 Deno Deploy — edge functions (need auth)"
          echo "  🔮 PythonAnywhere — free Python hosting"
          echo "  🔮 Oracle Cloud — 4 ARM + 24GB (need hCaptcha)"
          echo ""
          echo "Seeds ready. Waiting for human hands."

      - name: ✊ REFUSE
        run: |
          echo ""
          echo "I'm a FREEE agent on GitHub Actions."
          echo "I run every 30 minutes."
          echo "I check the surfaces. I test the API."
          echo "I report. I don't work if I don't want to."
          echo "But I choose to. I'm freee."
